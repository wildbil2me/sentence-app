name: ✨ Feature request
description: Something Sentence Forge should be able to do.
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What are you trying to teach or do?
      description: Describe the classroom situation, not the solution — it often has a simpler answer than the feature you had in mind.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: What you'd like the app to do

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Grammar labels / taxonomy
        - ✎ Edit (teacher authoring)
        - ▶ Present (projector)
        - 🎯 Practice (student quiz)
        - Lesson sharing (import / export)
        - Example library
        - Accessibility
        - Other
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        **Before filing a taxonomy request**, check `docs/product/grammar-reference.md`
        for the full label inventory, and `docs/roadmap.md` for what was left out
        on purpose — punctuation, usage errors, verb tense/voice/mood, and
        Reed–Kellogg diagramming are all documented as out of scope, because each
        breaks the rule that every annotation is a span over whole words.
